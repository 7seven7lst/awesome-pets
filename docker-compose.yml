services:
  postgres:
    image: postgres:16-bookworm
    container_name: novellia_submission_db
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: novellia_pets
    ports:
      - "5435:5432"
    volumes:
      - novellia_pets_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  novellia_pets_postgres_data:
